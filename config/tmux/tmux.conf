# remap prefix from 'C-b' to 'C-;'
unbind C-b
unbind C-Space
set-option -g prefix C-Space
bind-key C-Space send-prefix

# split panes using w and v
unbind '"'
unbind %
bind w split-window -h
bind v split-window -v

bind Space last-window

# New window in current path
bind c new-window -c "#{pane_current_path}"

bind s choose-tree -Zs
bind S command-prompt -p "new session:" "new-session -s '%%' -c '#{pane_current_path}'"

# Smart-splits navigation

bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'

# Keep prefix-based navigation as fallback
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

set -g renumber-windows on
set -g detach-on-destroy on

# Status bar on top
set -g status-position top
set -g status-justify left

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

set -g focus-events on
set -g escape-time 0

# Copy mode improvements
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# https://github.com/3rd/image.nvim/?tab=readme-ov-file#tmux
# This is needed by the image.nvim plugin
set -gq allow-passthrough on
# This is related to the `tmux_show_only_in_active_window = true,` config in
# image.nvim
set -g visual-activity off


source-file ~/.config/tmux/palette.conf
setw -g window-status-current-format "[#I]#W"
setw -g window-status-format "[#I]#W"
set -g status-left '#[fg=#{@gold},bold] #S #[default] '
set -g status-left-length 30
set -g status-right '#{prefix_highlight} #[fg=#{@gold}]%Y-%m-%d | %H:%M'

set -g pane-border-status top
set -g pane-border-format ' #P #{pane_current_command} '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'


